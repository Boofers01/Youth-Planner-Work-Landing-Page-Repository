<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="Images/logos/logo-icon.png">
<link rel="stylesheet" href="styles.css">
<title>Log in &mdash; Youth Ministry Planner</title>
</head>
<body>
<nav class="navbar">
  <a class="nav-brand" href="index.html">
    <img src="Images/logos/logo-icon.png" alt="Youth Ministry Planner logo">
    <div class="brand-text">Youth Ministry<br><span>Planner</span></div>
  </a>
  <button class="nav-toggle" aria-label="Open menu">&#9776;</button>
  <div class="nav-links">
    <a href="index.html#pricing">Pricing</a>
    <a href="contact.html">Contact</a>
    <a class="btn-login" href="signin.html">Log in</a>
  </div>
</nav>
<main class="page-hero">
  <div class="card">
    <img src="Images/logos/logo-icon.png" alt="" style="height:64px;margin:0 auto 0.8rem">
    <h1>Welcome back</h1>
    <p class="sub">Log in to your Youth Ministry Planner account</p>
    <form action="#" method="post" onsubmit="alert('Connect this form to your app backend.');return false;">
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@church.org" required>
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
      </div>
      <button class="btn-primary" type="submit">Log in</button>
    </form>
    <p class="small">Don&rsquo;t have an account? <a href="index.html#pricing">See plans</a> &middot; <a href="#">Forgot password?</a></p>
  </div>
</main>
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-links">
      <h4>Legal &amp; Support</h4>
      <a href="terms.html">Terms of Service</a>
      <a href="contact.html">Contact Us</a>
    </div>
    <div class="footer-links">
      <h4>Links</h4>
      <a href="index.html">Home</a>
      <a href="index.html#pricing">Pricing</a>
      <a href="signin.html">Log in</a>
    </div>
  </div>
  <div class="footer-bottom">&copy; 2026 Youth Ministry Planner. All rights reserved.</div>
</footer>
<script src="script.js"></script>
</body>
</html>
